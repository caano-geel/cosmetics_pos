# Render Blueprint — CBPOS (Docker + .env.render)
# Database credentials are loaded from `.env.render` → `.env` at container start.
# No dashboard env vars required for DB_* when `.env.render` is in the repo/image.

services:
  - type: web
    name: cbpos
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
