# Render Blueprint — CBPOS (Docker + Aiven MySQL)
# Non-secret config: .env.render (DB_HOST, DB_PORT, DB_SSL, etc.)
# Secret: set DB_PASSWORD in Render Dashboard → Environment

services:
  - type: web
    name: cbpos
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DB_PASSWORD
        sync: false
